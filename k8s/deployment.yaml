apiVersion: apps/v1
kind: Deployment
metadata:
  name: tech-blog-deployment
  labels:
    app: tech-blog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tech-blog
  template:
    metadata:
      labels:
        app: tech-blog
    spec:
      containers:
      - name: tech-blog
        image: codeberg.org/stackdrift-images/homepage:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
